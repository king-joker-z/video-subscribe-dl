name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        # bscheduler/dscheduler 是 PR1 物理隔离阶段的过渡包，尚未接入主调度器
        # PR2/PR3 完成后将切换为 ./...
        run: go build $(go list ./... | grep -v 'scheduler/bscheduler' | grep -v 'scheduler/dscheduler')

      - name: Test
        run: go test $(go list ./... | grep -v 'scheduler/bscheduler' | grep -v 'scheduler/dscheduler') -v -count=1 -timeout 120s
