name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        # bscheduler/dscheduler 是 PR1 物理隔离阶段的过渡包，尚未接入主调度器
        # PR2/PR3 完成后将切换为 ./...
        run: |
          go build ./cmd/...
          go build ./internal/bilibili/...
          go build ./internal/douyin/...
          go build ./internal/db/...
          go build ./internal/downloader/...
          go build video-subscribe-dl/internal/scheduler
          go build ./web/...

      - name: Test
        run: |
          go test video-subscribe-dl/internal/bilibili -v -count=1 -timeout 120s
          go test video-subscribe-dl/internal/douyin -v -count=1 -timeout 120s
          go test video-subscribe-dl/internal/db -v -count=1 -timeout 120s
          go test video-subscribe-dl/internal/downloader -v -count=1 -timeout 120s
          go test video-subscribe-dl/internal/scheduler -v -count=1 -timeout 120s
          go test video-subscribe-dl/internal/danmaku -v -count=1 -timeout 120s
          go test video-subscribe-dl/web/api -v -count=1 -timeout 120s
