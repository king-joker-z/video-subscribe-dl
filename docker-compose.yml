version: '3.8'

services:
  video-subscribe-dl:
    image: jokermelove/video-subscribe-dl:latest
    container_name: video-subscribe-dl
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/data             # 数据库 + 配置（很小）
      - /mnt/storage/videos:/app/downloads  # 下载的视频（改成你的存储路径）
    environment:
      - TZ=Asia/Shanghai
      # - AUTH_TOKEN=your-secret-token  # 可选：设置 API 访问密码
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # 资源限制（按需取消注释）
    # mem_limit: 512m
    # cpus: 1.0
